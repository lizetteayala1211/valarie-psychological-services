<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0D5F63">
  <title>Contact | Valarie Psychological Services</title>
  <link
    rel="icon"
    type="image/png"
    href="assets/logo/open-delta.png" alt="Valarie Psychological Services logo">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <div id="site-header"></div>

  <main class="contact-page">

    <video
    autoplay
    muted
    loop
    playsinline
    class="contact-video"
  >
    <source src="assets/videos/floating-buoy.mp4" type="video/mp4">
  </video>

    <section class="contact-container">

      <h1>Pain is inevitable, suffering is optional.</h1>

      <div class="contact-grid">

        <form class="contact-form" action="https://formsubmit.co/YOUR-EMAIL"
  method="POST">
          <h2>Get in touch</h2>

          <div class="form-row">
            <label>
              First Name
              <input type="text" name="first-name">
            </label>

            <label>
              Last Name
              <input type="text" name="last-name">
            </label>
          </div>

          <div class="form-row">
            <label>
              Email Address
              <input type="email" name="email">
            </label>

            <label>
              Phone Number
              <input type="tel" name="phone">
            </label>
          </div>

          <label>
            Message
            <textarea name="message"></textarea>
          </label>

          <button type="submit">Submit</button>
        </form>

        <aside class="contact-details">
          <img src="assets/logo/blue-open-delta.png" alt="Valarie Psychological Services logo" class="contact-logo">

          <div>
            <h2>Email</h2>
            <p>valariepsyservices@gmail.com</p>
          </div>

          <div>
            <h2>Phone Number</h2>
            <p>(469) 708-9426</p>
          </div>
        </aside>

      </div>

    </section>

  </main>

  <div id="site-footer"></div>

  <script src="js/main.js"></script>

</body>

</html>
